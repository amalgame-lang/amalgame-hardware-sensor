name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04,     arch: x86_64, asset: linux-x86_64 }
          - { runner: ubuntu-24.04-arm, arch: arm64,  asset: linux-arm64 }
        amc-tag: [v0.8.73]
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y libgc-dev build-essential
      - name: Download amc ${{ matrix.amc-tag }}
        run: |
          set -e
          TAG="${{ matrix.amc-tag }}"; V="${TAG#v}"
          curl -sSL -o amc.tar.gz "https://github.com/amalgame-lang/Amalgame/releases/download/${TAG}/amc-${V}-${{ matrix.asset }}.tar.gz"
          mkdir -p "$RUNNER_TEMP/amc"; tar -xzf amc.tar.gz -C "$RUNNER_TEMP/amc" --strip-components=1
          echo "AMC=$RUNNER_TEMP/amc/bin/amc" >> "$GITHUB_ENV"
      - name: Test (drivers vs fake HAL backends)
        run: ./tests/run_tests.sh "$AMC"
